// TF2 Leveling System - Chat Tags
// Version: 1.3.0
//
// Two formats supported:
//
// Simple:     "level"  "{#RRGGBB}[Tag Text]"
// Extended:   "level"  { "tag" "{#RRGGBB}[Tag Text]"  "name_color" "{teamcolor}"  "flag" "a" }
//
// Multi-color tags:
//   "{#FF0000}[{#00FF00}Newbie{#FF0000}]" — each character can have its own color.
//   Supports {#RRGGBB}, {red}, {green}, {blue}, {default}, {teamcolor}, etc.
//
// Name color (optional, extended format only):
//   "name_color" "{#RRGGBB}"  — colors the player's name in chat.
//   Omit or leave empty to keep the default team color.
//
// Flag values (from SourceMod admin flags):
//   "a" = reservation (ADMFLAG_RESERVATION) — typical VIP/donor flag
//   "b" = generic     (ADMFLAG_GENERIC)
//   "d" = slay        (ADMFLAG_SLAY)
//   "z" = root        (ADMFLAG_ROOT)
//   See: https://wiki.alliedmods.net/Adding_Admins_(SourceMod)
//
// Players automatically get the highest tag they've unlocked.
// They can manually select any unlocked tag via !tags command.
// VIPs can override with a fully custom tag via !customtag.

"LevelingTags"
{
    // Available to all players
    "1"     "{#00FF00}[Newbie]"
    "5"     "{#00BFFF}[Regular]"
    "10"    "{#FFD700}[Veteran]"
    "15"    "{#FF8C00}[Expert]"
    "25"    "{#FF4500}[Elite]"
    "35"    "{#DC143C}[Master]"
    "50"    "{#FF00FF}[Legend]"

    // Extended format example with name color and VIP flag:
    // "10"
    // {
    //     "tag"          "{#FFD700}[{#FFFFFF}VIP Gold{#FFD700}]"
    //     "name_color"   "{#FFD700}"
    //     "flag"         "a"
    // }
    // "1"
    // {
    //     "tag"          "{#FF69B4}[Supporter]"
    //     "name_color"   "{#FF69B4}"
    //     "flag"         "a"
    // }
}
