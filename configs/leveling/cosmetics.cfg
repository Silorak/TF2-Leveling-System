    "Pets"
    {
        // Pet companion NPCs that follow you around with animations and sounds.
        //
        // Required:
        //   "model"              = MDL model path
        //   "level"              = Minimum level to unlock
        //
        // Animations (use HLMV tool to find sequence names):
        //   "anim_idle"          = Idle animation name
        //   "anim_walk"          = Walking/running animation name
        //   "anim_jump"          = Jump animation name
        //
        // Positioning:
        //   "height_type"        = 1 (ground) or 2 (hover/fly)
        //   "height_custom"      = Z offset when height_type is 2
        //   "modelscale"         = Scale (0.5 = half size, 1.0 = full)
        //
        // Sounds:
        //   "sound_idle_amount"  = Number of idle sounds (max 10)
        //   "sound_idle"         = First idle sound path
        //   "sound_idle_2" ..    = Additional idle sounds (up to _10)
        //   "sound_jumping"      = Sound when pet jumps
        //   "sound_walking"      = Footstep sound while pet is moving
        //   "pitch"              = Sound pitch (50-200, default 100)
        //   "volume"             = Sound volume (0.0-1.0, default 0.5)
        //
        // Appearance:
        //   "desc"               = Description shown in menu
        //   "skin"               = Default skin index (0-based)
        //   "skins"              = Total number of skins in model
        //   "can_be_colored"     = 1 to allow color tinting, 0 to disable
        //
        // Access:
